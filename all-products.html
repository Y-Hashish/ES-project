<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style_all-Products.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <title>All Products</title>
</head>
<body>
    <nav class="main-nav" id="main-nav"> 
      <div class="main-logo">
        <a href="#">shop.co</a>
      </div>

      <div class="links">
        <ul>
          <li><a href="#">Category</a></li>
          <li><a href="#">New Arrivals</a></li>
        </ul>
      </div>

      <div class="nav-actions">
        <div class="search">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="20px"
            viewBox="0 -960 960 960"
            width="20px"
            fill="#828282"
          >
            <path
              d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"
            />
          </svg>
          <input type="text" placeholder="Search for products..." />
        </div>

        <div class="cart">
          <a href="#">Cart (0)</a>
        </div>
      </div>
    </nav>

    <main>
        <div class="breadcrumb">
          <a href="#">Home</a> &gt; <span id="current-category">All Products</span>
        </div>

        <div class="filters">
          <h2>Filters</h2>

          <div class="filter-group">
            <h3>Category</h3>
            <ul id="category-filters">
              <!-- Categories will be dynamically populated here -->
               <li><a href="" data-category="all">All Categories</a></li>
            </ul>
          </div>

          <div class="filter-group">
            <h3>Price Range</h3>
            <input type="range" id="price-range" min="0" max="1000" step="10" />
            <span id="price-range-value">Up to $1000</span>
          </div>

          <div class="filter-group">
            <h3>Brand</h3>
            <ul id="brand-filters">
              <!-- Brands will be dynamically populated here -->
            </ul>
          </div>



        <div class="Above_product-grid" id="Above_product-grid">
        <h1 class="section-title"><span id="section-title">All Products</span></h1>

        <p class="showing_info">Showing <span id="current-products">1-10 </span>of <span id="total-products">0</span> products :</p>

        <select id="sort-options">
          <option value="Most Popular">Sort by: Most Popular</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name-asc">Name: A to Z</option>
          <option value="name-desc">Name: Z to A</option>
        </select>
            
        </div>
        <div class="product-grid" id="product-grid">
          <!-- Products will be dynamically populated here -->
        </div>

        <div class="under_product-grid" id="under_product-grid">
            <button id="prev-page" >Previous</button>
            <div id="pagination-info">
              
            </div>
            <button id="next-page" >Next</button>
        </div>

        <script src="all-products_JS.js"></script>
    </main>

</body>
</html>
