<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YH-Market</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="cart.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <nav class="navbar">
      <a href="#" class="logo-link">
        <img
          src="images/YH_Market_Logo_4K_horizontal.png"
          alt="YH-Market Logo"
          class="logo-img"
        />
      </a>

      <ul class="nav-items">
        <li class="dropdown">
          <a href="#" class="nav-link"
            >Shop <i class="fa-solid fa-caret-down"></i
          ></a>
          <ul class="dropdown-content">
            <li><a href="#">Category 1</a></li>
            <li><a href="#">Category 2</a></li>
            <li><a href="#">Category 3</a></li>
          </ul>
        </li>
        <li><a href="#" class="nav-link">Brands</a></li>
        <li>
          <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input
              type="text"
              class="search-input"
              placeholder="Search for anything..."
            />
          </div>
        </li>
      </ul>
    </nav>

    <div class="cart">
      <div>
        <h2>Cart</h2>
        <div class="cart__items" id="cart"></div>
      </div>
      <h3 class="total">Total : <span id="total"></span></h3>
    </div>
    <script src="cart.js"></script>
  </body>
</html>
